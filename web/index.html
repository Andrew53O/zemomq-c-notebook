<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZeroMQ Notebook Clone</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="notebook-header">
      <div class="brand-row">
        <div class="brand-mark">Z</div>
        <div>
          <h1>ZeroMQ Notebook Clone</h1>
          <p>Last checkpoint: local C kernel</p>
        </div>
        <div class="kernel-state" title="Kernel status">
          <span class="kernel-dot"></span>
          C + ZeroMQ
        </div>
      </div>
      <nav class="toolbar" aria-label="Notebook actions">
        <button id="save" type="button" title="Save checkpoint">Save</button>
        <button id="add-cell" type="button" title="Insert cell below">+</button>
        <button id="run-all" type="button" title="Run all cells">Run All</button>
        <button id="interrupt" type="button" title="Interrupt kernel">Interrupt</button>
        <button id="shutdown" type="button" title="Shutdown kernel">Shutdown</button>
        <span class="toolbar-separator"></span>
        <select aria-label="Cell type">
          <option>C Code</option>
        </select>
        <span id="status" class="status" role="status">Loading notebook...</span>
      </nav>
    </header>

    <main>
      <section id="cells" class="cells" aria-label="Notebook cells"></section>
    </main>

    <template id="cell-template">
      <article class="cell selected">
        <div class="cell-input">
          <div class="prompt input-prompt"></div>
          <div class="cell-editor">
            <div class="cell-toolbar">
              <span class="cell-label"></span>
              <div class="cell-actions">
                <button class="run-cell" type="button">Run</button>
                <button class="delete-cell" type="button" title="Delete cell">&times;</button>
              </div>
            </div>
            <div class="code-surface">
              <pre class="syntax-highlight" aria-hidden="true"></pre>
              <textarea spellcheck="false" rows="1"></textarea>
            </div>
          </div>
        </div>
        <div class="cell-output">
          <div class="prompt output-prompt"></div>
          <pre class="output" aria-live="polite"></pre>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
